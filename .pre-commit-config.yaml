repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        always_run: true
      - id: end-of-file-fixer
        always_run: true
      - id: check-added-large-files
        always_run: true

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/longwave-innovation-lab/longwave-terraform-git-hooks
    rev: v0.2.0
    hooks:
      - id: terraform-naming
      - id: terraform-comments
      - id: terraform-locals-position

  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform fmt
        entry: terraform fmt -recursive
        language: system
        pass_filenames: false
        files: \.(tf|tfvars)$

      - id: terraform-validate
        name: Terraform validate
        entry: terraform validate
        language: system
        pass_filenames: false
        files: \.(tf|tfvars|yaml|yml)$
        exclude: ^(\.github/workflows/|\.pre-commit-config\.yaml)
